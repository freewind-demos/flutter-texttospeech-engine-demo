org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# AGP/Android build is unreliable on JDK 25+ in this environment; pin JDK 17 for the Gradle daemon.
org.gradle.java.home=/usr/local/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
android.useAndroidX=true
# Avoid AGP auto-downloading SDK components from dl.google.com when downloads are flaky (install NDK/Platform via other means).
android.builder.sdkDownload=false
